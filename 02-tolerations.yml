apiVersion: apps/v1
kind: Deployment
metadata:
  name: taint-tolerations
  labels:
    project: roboshop
    purpose: tolerations-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      purpose: tolerations-demo
      project: roboshop
  template:
    metadata:
      labels:
        purpose: tolerations-demo
        project: roboshop

    spec:
      nodeSelector:
        kubernetes.io/hostname: ip-192-168-1-9.ec2.internal
      containers:
      - name: nginx
        image: nginx:latest
